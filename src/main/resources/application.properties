# ============================================================
# 1. \u6838\u5FC3\u6570\u636E\u5E93\u8FDE\u63A5\uFF08\u8FDE\u63A5\u5C0F\u76AE\u9762\u677F\u4E2D\u7684 MySQL\uFF09
# ============================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/attendance_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8&useSSL=false
spring.datasource.username=root
spring.datasource.password=root

# ============================================================
# 2. JPA/Hibernate \u914D\u7F6E
# ============================================================

# \u81EA\u52A8\u66F4\u65B0\u6570\u636E\u5E93\u8868\u7ED3\u6784 (update: \u5B9E\u4F53\u7C7B\u6539\u52A8\u540E\uFF0CJPA \u4F1A\u81EA\u52A8\u540C\u6B65\u5230\u6570\u636E\u5E93\u8868)
spring.jpa.hibernate.ddl-auto=update

# \u5728\u63A7\u5236\u53F0\u663E\u793A JPA \u751F\u6210\u7684 SQL \u8BED\u53E5 (\u65B9\u4FBF\u68C0\u67E5 JPA \u662F\u5426\u6B63\u5E38\u5DE5\u4F5C)
spring.jpa.show-sql=true

# \u683C\u5F0F\u5316\u63A7\u5236\u53F0\u8F93\u51FA\u7684 SQL \u8BED\u53E5\uFF0C\u4F7F\u5176\u66F4\u6613\u8BFB
spring.jpa.properties.hibernate.format_sql=true

# \u6307\u5B9A\u6570\u636E\u5E93\u65B9\u8A00
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# 3. \u5176\u4ED6\u914D\u7F6E
# ============================================================
server.port=8080